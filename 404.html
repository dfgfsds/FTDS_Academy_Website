<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTDS Academy</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* Top Contact Bar */
        .top-bar {
            background: #ff6409;
            padding: 8px 0;
            font-size: 14px;
            color: #fff;
            border-bottom: 1px solid #eee;
        }
        .top-bar i {
            margin-right: 5px;
        }

        /* Header Styling */
        .header {
            background: #fff;
            padding: 12px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .nav-link {
            font-weight: 500;
            color: #333 !important;
            margin: 0 12px;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ff6b00 !important;
        }

        .login-btn {
            border: 1px solid #ff6b00;
            color: #ff6b00 !important;
            padding: 6px 16px;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: 500;
        }
        .login-btn:hover {
            background: #ff6b00;
            color: #fff !important;
        }

        /* Mobile Menu */
        #mobileMenu {
            position: fixed;
            top: 0;
            left: -270px;
            width: 270px;
            height: 100%;
            background: #fff;
            padding: 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            transition: 0.4s ease;
            z-index: 9999;
        }
        #mobileMenu.active {
            left: 0;
        }
        #mobileMenu a {
            display: block;
            padding: 12px 0;
            font-size: 17px;
            color: #000;
            border-bottom: 1px solid #f2f2f2;
            text-decoration: none;
        }
        #mobileMenu a:hover {
            color: #ff6b00;
        }

        /* Close Button */
        .close-menu {
            font-size: 25px;
            cursor: pointer;
            color: #333;
            text-align: right;
            margin-bottom: 20px;
        }
        .close-menu:hover {
            color: #ff6b00;
        }

        .logo-img {
            height: 42px;
        }

        /* Mobile Enroll Button */
        .mobile-enroll {
            margin-top: 20px;
            text-align: center;
        }
        .mobile-enroll a {
            display: block;
            padding: 10px;
            background: #ff6b00;
            color: #fff !important;
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- 📌 TOP CONTACT BAR -->


<div class="top-bar">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between">

        <!-- LEFT ITEM -->
        <div class="mb-2 mb-md-0">
            <i class="fa-solid fa-location-dot"></i> 
            No. 46, Giri Road, T. Nagar, Chennai-600 017
        </div>

        <!-- RIGHT ITEMS (EMAIL + PHONE) -->
        <div class="d-flex flex-column flex-md-row align-items-center gap-2 gap-md-5">
            <div>
                <i class="fa-solid fa-envelope"></i> info@ftdigitalsolutions.in
            </div>
            <div>
                <i class="fa-solid fa-phone"></i> +91 87688 76897
            </div>
        </div>

    </div>
</div>

    <!-- 📌 MOBILE SIDE MENU -->
    <div id="mobileMenu">
        <div class="close-menu" id="closeMenu"><i class="fa-solid fa-xmark"></i></div>

        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>

        <!-- Mobile Enroll Button -->
        <div class="mobile-enroll">
            <a href="#">Enroll Now</a>
        </div>

        <hr>

        <a href="tel:+918768876897" class="fw-bold">
            <i class="fa-solid fa-phone"></i> +91 87688 76897
        </a>
        <a href="mailto:info@ftdigitalsolutions.in">
            <i class="fa-solid fa-envelope"></i> info@ftdigitalsolutions.in
        </a>
    </div>

    <!-- 📌 HEADER -->
    <header class="header">
        <div class="container d-flex align-items-center justify-content-between">

            <!-- LEFT: LOGO -->
            <img src="https://assets.swiggy.com/swiggy/public/android/favicon.png"
                 class="logo-img" alt="FTDS Logo">

            <!-- DESKTOP NAV -->
            <ul class="nav d-none d-lg-flex">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>

            <!-- RIGHT: DESKTOP ENROLL -->
            <div class="d-none d-lg-block">
                <a href="#" class="login-btn">Enroll Now</a>
            </div>

            <!-- RIGHT: MOBILE MENU BUTTON -->
            <button class="btn d-lg-none" id="menuBtn">
                <i class="fa-solid fa-bars fs-3"></i>
            </button>

        </div>
    </header>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Open Menu
        document.getElementById("menuBtn").addEventListener("click", () => {
            document.getElementById("mobileMenu").classList.add("active");
        });

        // Close Menu
        document.getElementById("closeMenu").addEventListener("click", () => {
            document.getElementById("mobileMenu").classList.remove("active");
        });
    </script>

</body>
</html>
